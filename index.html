<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajakan Makan Sore ☕</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource/inter@4.5.0/index.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { overflow-x: hidden; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: clamp(28px, 5vw, 48px) clamp(20px, 5vw, 40px);
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: clamp(48px, 10vw, 64px);
            margin-bottom: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #fff;
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 28px;
        }

        .details {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(13px, 3.5vw, 15px);
        }

        .detail-item:last-child { border-bottom: none; }

        .detail-item .emoji {
            font-size: clamp(20px, 5vw, 24px);
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }

        .detail-item .text { text-align: left; }

        .detail-item .label {
            font-size: clamp(9px, 2.5vw, 11px);
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .detail-item .value { font-weight: 600; }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 60px;
            padding: 10px 0;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            user-select: none;
        }

        .btn-mau {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
        }

        .btn-mau:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(233, 69, 96, 0.6);
        }

        .btn-tolak {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-tolak:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Animasi swap */
        .btn.swapping {
            animation: swapPop 0.35s ease;
        }

        @keyframes swapPop {
            0% { transform: scale(1) rotate(0deg); }
            40% { transform: scale(0.8) rotate(-8deg); }
            70% { transform: scale(1.1) rotate(4deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .acceptance-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .acceptance-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .acceptance-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
            padding: 20px;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .acceptance-content .big-emoji {
            font-size: clamp(60px, 15vw, 80px);
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        .acceptance-content h2 {
            color: #fff;
            font-size: clamp(24px, 6vw, 32px);
            margin-bottom: 12px;
        }

        .acceptance-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(14px, 3.5vw, 16px);
            max-width: 320px;
        }

        .confetti {
            position: fixed;
            top: -10px;
            z-index: 101;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        .heart {
            position: fixed;
            animation: floatUp 3s ease-out forwards;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
        }

        .hint-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(10px, 2.8vw, 12px);
            margin-top: 16px;
            font-style: italic;
            transition: opacity 0.3s ease;
        }

        .hint-text.highlight {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        @media (max-width: 380px) {
            .detail-item .emoji { width: 34px; height: 34px; }
            .buttons { gap: 12px; }
            .btn { padding: 12px 24px; width: 100%; }
        }

        @media (min-width: 768px) {
            .container { padding: 48px 44px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="icon">🌅</div>
        <h1>Yuk, Makan Sore!</h1>
        <p class="subtitle">Ada yang mau ngajak kamu nih~</p>

        <div class="details">
            <div class="detail-item">
                <div class="emoji">📅</div>
                <div class="text">
                    <div class="label">Tanggal</div>
                    <div class="value">Senin, 29 Juni 2026</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">📍</div>
                <div class="text">
                    <div class="label">Lokasi</div>
                    <div class="value">Cafe Delapa</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🕐</div>
                <div class="text">
                    <div class="label">Waktu</div>
                    <div class="value">Sore - Jam 7 Malam</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🍽️</div>
                <div class="text">
                    <div class="label">Aktivitas</div>
                    <div class="value">Makan & Ngobrol</div>
                </div>
            </div>
        </div>

        <div class="buttons" id="buttonArea">
            <button class="btn btn-mau" id="btnMau" onclick="accept()">💖 Mau</button>
            <button class="btn btn-tolak" id="btnTolak">Tolak</button>
        </div>

        <p class="hint-text" id="hintText">* Coba hover tombol tolak~ 😏</p>
    </div>

    <div class="acceptance-overlay" id="overlay">
        <div class="acceptance-content">
            <div class="big-emoji">🎉</div>
            <h2>Yeayy! Makasih ya!</h2>
            <p>Udah ditunggu di Cafe Delapa, Senin 29 Juni 2026! Sampai ketemu~ ✨</p>
        </div>
    </div>

    <script>
        /* ============================
           STARS
        ============================ */
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            starsContainer.appendChild(star);
        }

        /* ============================
           SWAP LOGIC
        ============================ */
        const btnMau = document.getElementById('btnMau');
        const btnTolak = document.getElementById('btnTolak');
        const hintText = document.getElementById('hintText');

        let swapCount = 0;
        const MAX_SWAPS = 3;
        let isSwapped = false;
        let isCooldown = false;

        const hintMessages = [
            '* Coba hover tombol tolak~ 😏',
            '* Kok posisinya ketukar? 🤔',
            '* Yakin mau klik tolak? 😄',
            '* Klik Mau aja! 💕'
        ];

        function handleSwap() {
            // Cooldown: cegah re-trigger terlalu cepat
            if (isCooldown) return;

            // Kalau udah 3x, munculkan alert
            if (swapCount >= MAX_SWAPS) {
                showFinalAlert();
                return;
            }

            isCooldown = true;

            // Swap posisi pakai flexbox order
            isSwapped = !isSwapped;
            btnMau.style.order = isSwapped ? '2' : '1';
            btnTolak.style.order = isSwapped ? '1' : '2';

            // Animasi pop
            btnMau.classList.remove('swapping');
            btnTolak.classList.remove('swapping');
            void btnMau.offsetWidth; // force reflow
            btnMau.classList.add('swapping');
            btnTolak.classList.add('swapping');

            swapCount++;

            // Update hint text
            hintText.textContent = hintMessages[Math.min(swapCount, hintMessages.length - 1)];
            if (swapCount >= MAX_SWAPS) {
                hintText.classList.add('highlight');
            }

            // Cooldown 600ms
            setTimeout(() => {
                isCooldown = false;
            }, 600);

            // Setelah swap ke-3, munculkan alert
            if (swapCount >= MAX_SWAPS) {
                setTimeout(() => {
                    showFinalAlert();
                }, 500);
            }
        }

        function showFinalAlert() {
            // Custom alert modal (lebih bagus dari alert() browser)
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.7);
                backdrop-filter: blur(8px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 200;
                animation: fadeIn 0.3s ease;
            `;

            const content = document.createElement('div');
            content.style.cssText = `
                background: linear-gradient(135deg, #1a1a2e, #16213e);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 20px;
                padding: 32px 28px;
                text-align: center;
                max-width: 320px;
                width: 90%;
                animation: scaleIn 0.4s ease;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            `;

            content.innerHTML = `
                <div style="font-size: 56px; margin-bottom: 16px; animation: bounce 1s infinite;">😄</div>
                <h3 style="color: #fff; font-size: 22px; margin-bottom: 12px; font-family: 'Inter', sans-serif;">Klik Mau aja!</h3>
                <p style="color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px; font-family: 'Inter', sans-serif;">Udah 3x ketukar, nyerah aja klik 💖 Mau~</p>
                <button id="closeAlert" style="
                    background: linear-gradient(135deg, #e94560, #ff6b6b);
                    color: white;
                    border: none;
                    padding: 12px 32px;
                    border-radius: 10px;
                    font-size: 15px;
                    font-weight: 600;
                    cursor: pointer;
                    font-family: 'Inter', sans-serif;
                    transition: transform 0.2s ease;
                ">Oke, Mau! 💕</button>
            `;

            modal.appendChild(content);
            document.body.appendChild(modal);

            // Close modal
            document.getElementById('closeAlert').addEventListener('click', () => {
                modal.style.opacity = '0';
                modal.style.transition = 'opacity 0.3s ease';
                setTimeout(() => modal.remove(), 300);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.opacity = '0';
                    modal.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => modal.remove(), 300);
                }
            });
        }

        // Event listeners untuk swap
        btnTolak.addEventListener('mouseenter', handleSwap);
        
        // Support touch device
        btnTolak.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleSwap();
        }, { passive: false });

        /* ============================
           ACCEPT
        ============================ */
        function accept() {
            document.getElementById('overlay').classList.add('show');
            createConfetti();
            createHearts();
        }

        function createConfetti() {
            const colors = ['#e94560', '#ff6b6b', '#ffd93d', '#6bcf7f', '#4ecdc4', '#a855f7'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.width = (Math.random() * 10 + 5) + 'px';
                    el.style.height = (Math.random() * 10 + 5) + 'px';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 50);
            }
        }

        function createHearts() {
            const emojis = ['💖', '💕', '✨', '🎉', '💗', '🥰'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'heart';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.bottom = '0';
                    el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
