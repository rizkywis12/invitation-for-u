<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajakan Makan Sore ☕</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource/inter@4.5.0/index.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%);
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: clamp(28px, 5vw, 48px) clamp(20px, 5vw, 40px);
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: clamp(48px, 10vw, 64px);
            margin-bottom: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #fff;
            font-size: clamp(22px, 5vw, 28px);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 28px;
        }

        .details {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(13px, 3.5vw, 15px);
        }

        .detail-item:last-child { border-bottom: none; }

        .detail-item .emoji {
            font-size: clamp(20px, 5vw, 24px);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }

        .detail-item .text { text-align: left; }

        .detail-item .label {
            font-size: clamp(9px, 2.5vw, 11px);
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .detail-item .value { font-weight: 600; }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            min-height: 60px;
            padding: 10px 0;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .btn-mau {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
            z-index: 5;
            position: relative;
        }

        .btn-mau:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(233, 69, 96, 0.6);
        }

        .btn-tolak {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.25);
            user-select: none;
            z-index: 5;
            transition: transform 0.3s ease,
                        font-size 0.3s ease,
                        padding 0.3s ease,
                        opacity 0.6s ease;
        }

        /* Saat kabur: fixed position, tidak bisa diklik, animasi posisi */
        .btn-tolak.running {
            position: fixed;
            pointer-events: none;
            z-index: 50;
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.3s ease,
                        font-size 0.3s ease,
                        padding 0.3s ease,
                        opacity 0.6s ease;
            will-change: left, top, transform;
        }

        .btn-tolak.vanished {
            opacity: 0 !important;
            transform: scale(0) rotate(720deg) !important;
            pointer-events: none !important;
        }

        .acceptance-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .acceptance-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .acceptance-content {
            text-align: center;
            animation: scaleIn 0.5s ease;
            padding: 20px;
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .acceptance-content .big-emoji {
            font-size: clamp(60px, 15vw, 80px);
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        .acceptance-content h2 {
            color: #fff;
            font-size: clamp(24px, 6vw, 32px);
            margin-bottom: 12px;
        }

        .acceptance-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(14px, 3.5vw, 16px);
            max-width: 320px;
        }

        .confetti {
            position: fixed;
            top: -10px;
            z-index: 101;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        .heart {
            position: fixed;
            animation: floatUp 3s ease-out forwards;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
        }

        .hint-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(10px, 2.8vw, 12px);
            margin-top: 16px;
            font-style: italic;
            transition: opacity 0.3s ease;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 380px) {
            .detail-item .emoji {
                width: 34px;
                height: 34px;
            }
            .buttons {
                gap: 12px;
            }
            .btn {
                padding: 12px 24px;
                width: 100%;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 48px 44px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="icon">🌅</div>
        <h1>Yuk, Makan Sore!</h1>
        <p class="subtitle">Ada yang mau ngajak kamu nih~</p>

        <div class="details">
            <div class="detail-item">
                <div class="emoji">📅</div>
                <div class="text">
                    <div class="label">Tanggal</div>
                    <div class="value">Senin, 29 Juni 2026</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">📍</div>
                <div class="text">
                    <div class="label">Lokasi</div>
                    <div class="value">Cafe Delapa</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🕐</div>
                <div class="text">
                    <div class="label">Waktu</div>
                    <div class="value">Sore - Jam 7 Malam</div>
                </div>
            </div>
            <div class="detail-item">
                <div class="emoji">🍽️</div>
                <div class="text">
                    <div class="label">Aktivitas</div>
                    <div class="value">Makan & Ngobrol</div>
                </div>
            </div>
        </div>

        <div class="buttons" id="buttonArea">
            <button class="btn btn-mau" onclick="accept()">💖 Mau</button>
            <button class="btn btn-tolak" id="btnTolak">Tolak</button>
        </div>

        <p class="hint-text" id="hintText">* Tombol tolak agak pemalu 😄</p>
    </div>

    <div class="acceptance-overlay" id="overlay">
        <div class="acceptance-content">
            <div class="big-emoji">🎉</div>
            <h2>Yeayy! Makasih ya!</h2>
            <p>Udah ditunggu di Cafe Delapa, Senin 29 Juni 2026! Sampai ketemu~ ✨</p>
        </div>
    </div>

    <script>
        /* ============================
           STARS BACKGROUND
        ============================ */
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            starsContainer.appendChild(star);
        }

        /* ============================
           DODGE BUTTON CONFIG
        ============================ */
        const btnTolak = document.getElementById('btnTolak');
        const hintText = document.getElementById('hintText');

        let dodgeCount = 0;
        let hasStartedRunning = false;
        let hasVanished = false;
        let lastDodgeTime = 0;

        const DODGE_RADIUS = 110;         // Jarak deteksi cursor ke tombol
        const MIN_DODGE_INTERVAL = 500;   // Cooldown antar dodge (ms)
        const MAX_DODGE_COUNT = 7;        // Hilang setelah 7x dodge
        const MIN_DIST_FROM_CURSOR = 160; // Posisi baru minimal sejauh ini dari cursor
        const EDGE_MARGIN = 20;           // Margin dari edge viewport

        const texts = [
            'Yakin? 🥺',
            'Jangan dong~',
            'Kabuuur! 💨',
            'Ga bisa! 😜',
            'Nyerah aja~',
            'Pencet Mau 💕'
        ];

        /* ============================
           GET SAFE BOUNDARIES
        ============================ */
        function getSafeBounds() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const rect = btnTolak.getBoundingClientRect();
            const w = rect.width || 120;  // fallback
            const h = rect.height || 48;  // fallback

            return {
                minX: EDGE_MARGIN,
                maxX: Math.max(EDGE_MARGIN, vw - w - EDGE_MARGIN),
                minY: EDGE_MARGIN,
                maxY: Math.max(EDGE_MARGIN, vh - h - EDGE_MARGIN),
                w, h
            };
        }

        /* ============================
           DODGE LOGIC
        ============================ */
        function dodgeButton(cursorX, cursorY) {
            if (hasVanished) return;

            // Anti-spam cooldown
            const now = Date.now();
            if (now - lastDodgeTime < MIN_DODGE_INTERVAL) return;
            lastDodgeTime = now;

            dodgeCount++;

            // Cek apakah sudah waktunya hilang
            if (dodgeCount >= MAX_DODGE_COUNT) {
                vanishButton();
                return;
            }

            // Pertama kali dodge → ubah ke fixed positioning
            if (!hasStartedRunning) {
                hasStartedRunning = true;
                const rect = btnTolak.getBoundingClientRect();
                btnTolak.classList.add('running');
                btnTolak.style.left = rect.left + 'px';
                btnTolak.style.top = rect.top + 'px';
            }

            const bounds = getSafeBounds();

            // Cari posisi baru yang JAUH dari cursor & DALAM viewport
            let newX, newY;
            let attempts = 0;

            do {
                newX = bounds.minX + Math.random() * (bounds.maxX - bounds.minX);
                newY = bounds.minY + Math.random() * (bounds.maxY - bounds.minY);
                attempts++;

                const centerX = newX + bounds.w / 2;
                const centerY = newY + bounds.h / 2;
                const dist = Math.hypot(centerX - cursorX, centerY - cursorY);

                if (dist > MIN_DIST_FROM_CURSOR) break;
            } while (attempts < 30);

            // FINAL CLAMP — tidak mungkin keluar viewport
            newX = Math.max(bounds.minX, Math.min(newX, bounds.maxX));
            newY = Math.max(bounds.minY, Math.min(newY, bounds.maxY));

            btnTolak.style.left = newX + 'px';
            btnTolak.style.top = newY + 'px';

            // Rotasi sedikit biar playful
            const rotation = (Math.random() - 0.5) * 25;
            btnTolak.style.transform = `rotate(${rotation}deg)`;

            // Update teks tombol
            btnTolak.textContent = texts[Math.min(dodgeCount - 1, texts.length - 1)];

            // Update hint
            const remaining = MAX_DODGE_COUNT - dodgeCount;
            if (remaining <= 2) {
                hintText.textContent = `* Tombol tolak mau hilang... (${remaining}x lagi) 👀`;
            } else {
                hintText.textContent = `* Tombol tolak agak pemalu 😄`;
            }

            // Tombol "Mau" makin gede
            const mauBtn = document.querySelector('.btn-mau');
            const mauScale = 1 + dodgeCount * 0.05;
            mauBtn.style.transform = `scale(${Math.min(mauScale, 1.5)})`;

            // Tombol tolak makin kecil
            const tolakScale = Math.max(1 - dodgeCount * 0.05, 0.6);
            btnTolak.style.fontSize = `${16 * tolakScale}px`;
            btnTolak.style.padding = `${14 * tolakScale}px ${32 * tolakScale}px`;

            // Post-move safety: pastikan tetap di viewport setelah style berubah
            requestAnimationFrame(() => {
                const rect = btnTolak.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                let clamped = false;

                if (rect.right > vw - EDGE_MARGIN) {
                    btnTolak.style.left = (vw - rect.width - EDGE_MARGIN) + 'px';
                    clamped = true;
                }
                if (rect.bottom > vh - EDGE_MARGIN) {
                    btnTolak.style.top = (vh - rect.height - EDGE_MARGIN) + 'px';
                    clamped = true;
                }
                if (rect.left < EDGE_MARGIN) {
                    btnTolak.style.left = EDGE_MARGIN + 'px';
                    clamped = true;
                }
                if (rect.top < EDGE_MARGIN) {
                    btnTolak.style.top = EDGE_MARGIN + 'px';
                    clamped = true;
                }
            });
        }

        /* ============================
           VANISH BUTTON
        ============================ */
        function vanishButton() {
            hasVanished = true;
            btnTolak.classList.add('vanished');
            hintText.textContent = '* Tombol tolak udah kabur~ Pencet Mau aja 💕';

            setTimeout(() => {
                btnTolak.style.display = 'none';
            }, 700);
        }

        /* ============================
           PROXIMITY DETECTION (Mouse)
        ============================ */
        document.addEventListener('mousemove', (e) => {
            if (hasVanished || !btnTolak.offsetParent && hasStartedRunning) return;

            const rect = btnTolak.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const distance = Math.hypot(e.clientX - centerX, e.clientY - centerY);

            if (distance < DODGE_RADIUS) {
                dodgeButton(e.clientX, e.clientY);
            }
        });

        /* ============================
           PROXIMITY DETECTION (Touch)
        ============================ */
        document.addEventListener('touchstart', (e) => {
            if (hasVanished) return;
            const touch = e.touches[0];
            const rect = btnTolak.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const distance = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);

            if (distance < DODGE_RADIUS) {
                dodgeButton(touch.clientX, touch.clientY);
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (hasVanished) return;
            const touch = e.touches[0];
            const rect = btnTolak.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const distance = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);

            if (distance < DODGE_RADIUS) {
                dodgeButton(touch.clientX, touch.clientY);
            }
        }, { passive: true });

        /* ============================
           RESIZE SAFETY
        ============================ */
        window.addEventListener('resize', () => {
            if (!hasStartedRunning || hasVanished) return;
            const rect = btnTolak.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            if (rect.right > vw - EDGE_MARGIN)
                btnTolak.style.left = Math.max(EDGE_MARGIN, vw - rect.width - EDGE_MARGIN) + 'px';
            if (rect.bottom > vh - EDGE_MARGIN)
                btnTolak.style.top = Math.max(EDGE_MARGIN, vh - rect.height - EDGE_MARGIN) + 'px';
        });

        /* ============================
           ACCEPT
        ============================ */
        function accept() {
            document.getElementById('overlay').classList.add('show');
            createConfetti();
            createHearts();
        }

        function createConfetti() {
            const colors = ['#e94560', '#ff6b6b', '#ffd93d', '#6bcf7f', '#4ecdc4', '#a855f7'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.width = (Math.random() * 10 + 5) + 'px';
                    el.style.height = (Math.random() * 10 + 5) + 'px';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 50);
            }
        }

        function createHearts() {
            const emojis = ['💖', '💕', '✨', '🎉', '💗', '🥰'];
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'heart';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.bottom = '0';
                    el.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
